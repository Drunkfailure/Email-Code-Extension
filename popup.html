<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320, initial-scale=1" />
  <title>Email Reader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Email Reader</h1>
      <p class="subtitle">First 25 emails — new ones appear as list updates</p>
    </header>

    <div id="auth-section" class="section hidden">
      <p>Sign in with Google to read codes from your Gmail.</p>
      <button id="btn-signin" class="btn btn-primary">Sign in with Google</button>
    </div>

    <div id="main-section" class="section hidden">
      <div id="list-view">
        <div class="toolbar">
          <button id="btn-refresh" class="btn btn-ghost" title="Refresh">↻ Refresh</button>
          <button id="btn-signout" class="btn btn-ghost">Sign out</button>
        </div>
        <div id="codes-list" class="codes-list"></div>
        <div id="empty-state" class="empty-state hidden">
          <p>No emails yet. Refresh or check back in a moment.</p>
          <p class="hint">Try refreshing after you receive a new code.</p>
        </div>
        <div id="loading" class="loading hidden">Checking your inbox…</div>
        <div id="error" class="error hidden"></div>
      </div>
      <div id="email-view" class="email-view hidden">
        <button id="btn-back" class="btn btn-ghost back-btn">← Back</button>
        <div class="email-view-header">
          <div id="email-view-subject" class="email-view-subject"></div>
          <div id="email-view-meta" class="email-view-meta"></div>
        </div>
        <div id="email-view-loading" class="email-view-loading hidden">Loading…</div>
        <div id="email-view-body" class="email-view-body"></div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
